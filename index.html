<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>Simulatore Fotovoltaico - Rinascimento Solare</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <h1>SIMULATORE FOTOVOLTAICO</h1>

  <div class="container">

    <!-- PARAMETRI DI SIMULAZIONE -->
    <div class="section">
      <h2>Parametri di Simulazione</h2>

      <div class="parametri">

        <label>Consumi annui attuali (kWh)</label>
        <input type="number" id="consumi" value="4000">

        <label>Prezzo energia di consumo (€/kWh)</label>
        <input type="number" id="prezzoConsumo" value="0.25" step="0.01">

        <label>Prezzo energia di vendita (€/kWh)</label>
        <input type="number" id="prezzoVendita" value="0.10" step="0.01">

        <label>Percentuale di autoconsumo diretto (%)</label>
        <input type="range" id="autoconsumo" min="0" max="100" value="70">
        <span id="autoconsumoVal">70%</span>

        <label>Produzione annua stimata impianto (kWh)</label>
        <input type="number" id="produzione" value="4800">

        <label>Tasso annuo di inflazione energetica (%)</label>
        <input type="number" id="inflazione" value="3">

      </div>

      <button id="btnCalcola">Avvia simulazione</button>
      <button id="btnReset" class="reset">Reset</button>
    </div>

    <!-- RISULTATI -->
    <div class="section">
      <h2>Risultati di Simulazione</h2>

      <div class="risultati">
        <label>Risparmio diretto in bolletta (€)</label>
        <input type="text" id="risparmioBolletta" readonly>

        <label>Guadagno da rete (€)</label>
        <input type="text" id="guadagnoRete" readonly>

        <label>Totale risparmio annuo (€)</label>
        <input type="text" id="totaleAnnuale" readonly>
      </div>
    </div>

    <!-- TABELLA RENDIMENTO -->
    <div class="section">
      <h2>Rendimento Economico a 10 anni</h2>

      <table id="tabellaRendimento">
        <thead>
          <tr>
            <th>Anno</th>
            <th>Efficienza (%)</th>
            <th>Valore energia (€/kWh)</th>
            <th>Risparmio autoconsumo (€)</th>
            <th>Guadagno rete (€)</th>
            <th>Totale annuo (€)</th>
            <th>Cumulato (€)</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>

  </div>

  <script src="app.js"></script>
</body>
</html>
